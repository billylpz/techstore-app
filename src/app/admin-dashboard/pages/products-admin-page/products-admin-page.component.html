<section class="flex flex-col  flex-1">
  <h1 class="text-4xl text-center my-10">Lista de Productos</h1>


  @if (productsResource.value()?.totalElements!>0) {
  <div class="flex justify-center">
    <paginator [totalPages]="productsResource.value()?.totalPages" [currentPage]="productsResource.value()?.page" />
  </div>
  }


  <div class="flex gap-3 mt-10  justify-between">
    <div class="flex justify-start ">
      <a type="button" routerLink="form" class="bg-blue-600 w-fit px-3 py-1 rounded-sm">Crear Producto</a>
    </div>

    <div class="flex justify-center items-center gap-3 ">
      <label for="search-by" class="text-gray-400" >Buscar por nombre:</label>
      <input type="text" id="search-by" class="border rounded-sm px-2" autofocus [formControl]="searchByName">
    </div>

    <div class="flex items-center">
      <label for="select">Filtrar por:</label>
      <select name="filterBy" id="select" class="" (change)="onFilterChange(selectValue.value)" #selectValue>
        <option value="1" class="text-black">--seleccione--</option>
        <option value="1" class="text-black">Todos</option>
        <option value="2" class="text-black">Habilitado</option>
        <option value="3" class="text-black">Inhabilitado</option>
      </select>
    </div>
  </div>

  @if (productsResource.isLoading()) {
  <div class=" flex justify-center h-50 ">
    <span class="loading loading-dots loading-xl "></span>
  </div>
  } @else if (productsResource.value()?.content?.length==0) {
  <p class="  text-red-400 text-sm mt-15 flex justify-center">No se encontraron productos
  </p>
  }
  @else {
  <div class="flex-1">
    <products-table [products]="productsResource.value()?.content"
      (onDelete)="eliminarProducto($event)"></products-table>
  </div>
  }

  @if (productsResource.value()?.totalElements!>0) {
  <div class="flex justify-center">
    <paginator [totalPages]="productsResource.value()?.totalPages" [currentPage]="productsResource.value()?.page" />
  </div>
  }

</section>
