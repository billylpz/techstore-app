<section class="flex flex-col flex-1">
  <h1 class="text-4xl text-center my-10">Lista de Marcas</h1>

  @if (brandsResource.value()?.totalElements!>0) {
  <div class="flex justify-center">
    <paginator [totalPages]="brandsResource.value()?.totalPages" [currentPage]="brandsResource.value()?.page" />
  </div>
  }

  <div class="flex justify-between mt-10">
    <a type="button" routerLink="form" class="bg-blue-600 w-fit px-3 py-1 rounded-sm">Crear Marca</a>
    <admin-filter-bar (searchByNameValueEmitter)="searchByNameResult.set($event)"
      (filterSelectionEmitter)="filterSelection.set($event)">
    </admin-filter-bar>
  </div>

  @if (brandsResource.isLoading()) {
  <div class=" flex justify-center h-50 ">
    <span class="loading loading-dots loading-xl "></span>
  </div>
  } @else if (brandsResource.value()?.content?.length==0) {
  <p class="  text-red-400 text-sm mt-15 flex justify-center">No se encontraron marcas</p>
  }@else {
  <div class="flex-1">
    <brands-table [brands]="brandsResource.value()?.content" (onDelete)="eliminarMarca($event)"></brands-table>
  </div>
  }

  @if (brandsResource.value()?.totalElements!>0) {
  <div class="flex justify-center">
    <paginator [totalPages]="brandsResource.value()?.totalPages" [currentPage]="brandsResource.value()?.page" />
  </div>
  }

</section>
