<div class="max-w-4xl mx-auto mt-10 p-8 bg-gray-900 rounded-xl shadow-lg border border-gray-800">
  <h2 class="text-2xl font-bold text-white mb-6">Registro de Producto</h2>

  <form [formGroup]="myForm" (ngSubmit)="onSubmit()" class="space-y-6">

    <div>
      <label class="block text-sm font-medium text-gray-400 mb-2">Nombre del Producto</label>
      <input type="text" formControlName="name"
        class="w-full bg-gray-800 border border-gray-700 text-white rounded-lg p-2.5 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
      <form-error-label [control]="myForm.get('name')!" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-400 mb-2">Descripción</label>
      <textarea formControlName="description" rows="10" 
        class="w-full bg-gray-800 border border-gray-700 text-white rounded-lg p-2.5 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"></textarea>
      <form-error-label [control]="myForm.get('description')!" />
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div>
        <label class="block text-sm font-medium text-gray-400 mb-2">Precio (S/.)</label>
        <input type="number" formControlName="price"
          class="w-full bg-gray-800 border border-gray-700 text-white rounded-lg p-2.5 focus:ring-blue-500 focus:border-blue-500 outline-none">
        <form-error-label [control]="myForm.get('price')!" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-400 mb-2">Stock Disponible</label>
        <input type="number" formControlName="stock"
          class="w-full bg-gray-800 border border-gray-700 text-white rounded-lg p-2.5 focus:ring-blue-500 focus:border-blue-500 outline-none">
        <form-error-label [control]="myForm.get('stock')!" />
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div>
        <label class="block text-sm font-medium text-gray-400 mb-2">Categoría</label>
        <select formControlName="category" [compareWith]="compararEntities"
          class="w-full bg-gray-800 border border-gray-700 text-white rounded-lg p-2.5 focus:ring-blue-500 focus:border-blue-500 outline-none">
          <option [ngValue]="null">Seleccionar...</option>
          @for (cat of categoriesResource.value(); track cat.id) {
          <option [ngValue]="cat">{{cat.name}}</option>
          }
        </select>
        <form-error-label [control]="myForm.get('category')!" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-400 mb-2">Marca</label>
        <select formControlName="brand" [compareWith]="compararEntities"
          class="w-full bg-gray-800 border border-gray-700 text-white rounded-lg p-2.5 focus:ring-blue-500 focus:border-blue-500 outline-none">
          <option [ngValue]="null">Seleccionar...</option>
          @for (brand of brandsResource.value(); track brand.id) {
          <option [ngValue]="brand">{{brand.name}}</option>
          }
        </select>
        <form-error-label [control]="myForm.get('brand')!" />
      </div>
    </div>

    <div class="border p-3 flex flex-col gap-3 rounded-sm">
      <label for="upload-photos" class="text-red-400 cursor-pointer">Subir Fotos</label>
      <input id="upload-photos" type="file" multiple (change)="selectFiles($event)" accept="image/*"
        class="file-input file-input-bordered w-full max-w-xs">
    </div>


    <div class="border rounded-sm flex flex-col p-5 gap-3">

      <label for="" class="text-red-400">Fotos</label>

      <div class=" grid grid-cols-4 ">
        @for (productImage of productImages() ; track productImage.id) {

        <div class="">
          <img [src]="imageUtils.resizeImage(productImage.imageUrl,300)" title="abrir imagen" alt="urlPhoto" class="size-30 h-40 cursor-pointer "
            (click)="openImage(img)" #img>

            <div class="flex gap-2 items-center cursor-pointer" (click)="deleteImage(productImage.publicId)">
             <fa-icon [icon]="iconoBorrar" class="text-red-600 hover:text-red-800"></fa-icon>
             <p class="text-xs text-red-500">eliminar</p>
            </div>
        </div>
        }@empty{
        <p class="text-sm  col-span-4">Este producto aun no tiene fotos</p>
        }
      </div>
    </div>

    <!-- uploading photos layout -->
    @if (isUploadingPhotos()) {
    <saving-overlay />
    }


    <div class="pt-4  flex gap-10 justify-center">
      <button type="button" routerLink="/admin/products" class="w-fit bg-green-700 hover:bg-green-800 text-white font-bold py-3 px-4 rounded-lg transition-colors duration-300
          cursor-pointer">
        Volver
      </button>
      <button type="submit" [disabled]="myForm.invalid" class="w-fit bg-red-600 hover:bg-red-700 disabled:bg-gray-700 disabled:text-gray-500
         text-white font-bold py-3 px-4 rounded-lg transition-colors duration-300 cursor-pointer">
        Guardar Producto
      </button>
    </div>

  </form>
</div>
