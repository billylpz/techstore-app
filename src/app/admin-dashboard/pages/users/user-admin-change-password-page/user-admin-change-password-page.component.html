<div class="max-w-4xl mx-auto mt-10 p-8 bg-gray-900 rounded-xl shadow-lg border border-gray-800">
  <div class="mb-8 ">
    <h1 class="text-3xl font-bold">Mi Perfil</h1>
    <p class="text-gray-500">Cambiar contraseña</p>
  </div>

  <form [formGroup]="myForm" (ngSubmit)="onSubmit()" class="space-y-6">

    <div>
      <label class="block text-sm font-medium text-gray-400 mb-2">Contraseña actual</label>
      <input type="password" formControlName="currentPassword"
        class="w-full bg-gray-800 border border-gray-700 text-white rounded-lg p-2.5 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
      <form-error-label [control]="myForm.get('currentPassword')!" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-400 mb-2">Contraseña nueva</label>
      <input type="password" formControlName="password"
        class="w-full bg-gray-800 border border-gray-700 text-white rounded-lg p-2.5 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
      <form-error-label [control]="myForm.get('password')!" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-400 mb-2">Repetir contraseña nueva</label>
      <input type="password" formControlName="confirmPassword"
        class="w-full bg-gray-800 border border-gray-700 text-white rounded-lg p-2.5 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
      <form-error-label [control]="myForm.get('confirmPassword')!" />
    </div>

    @if (myForm.get('confirmPassword')?.touched && myForm.hasError('mismatch')) {
    <span class="text-red-500 text-xs mt-1">Las contraseñas no coinciden.</span>
    }

    <div class="pt-4  flex gap-10 justify-center">
      <button type="button" routerLink="/admin/users" class="w-fit bg-green-700 hover:bg-green-800 text-white font-bold py-3 px-4 rounded-lg transition-colors duration-300
          cursor-pointer">
        Volver
      </button>
      <button type="submit" [disabled]="myForm.invalid" class="w-fit bg-red-600 hover:bg-red-700 disabled:bg-gray-700 disabled:text-gray-500
         text-white font-bold py-3 px-4 rounded-lg transition-colors duration-300 cursor-pointer">
        Guardar Usuario
      </button>
    </div>

  </form>
</div>
