<div class="min-h-screen flex items-center justify-center bg-white px-4 py-10 rounded-xl">
  <div class="max-w-md w-full bg-white rounded-xl shadow-xl p-8">
    <h2 class="text-2xl font-bold text-center text-gray-800 mb-8">Registrarse</h2>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-4">

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nombres</label>
          <input type="text" formControlName="name"
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all text-gray-600"
            [class.border-red-500]="registerForm.get('name')?.touched && registerForm.get('name')?.invalid">
          <form-error-label [control]="registerForm.get('name')!" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Apellidos</label>
          <input type="text" formControlName="lastname"
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all text-gray-600"
            [class.border-red-500]="registerForm.get('lastname')?.touched && registerForm.get('lastname')?.invalid">
          <form-error-label [control]="registerForm.get('lastname')!" />
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label>
        <input type="email" formControlName="email"
          class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all text-gray-600"
          [class.border-red-500]="registerForm.get('email')?.touched && registerForm.get('email')?.invalid"
          placeholder="ejemplo@correo.com">
        <form-error-label [control]="registerForm.get('email')!" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
        <input type="text" formControlName="username"
          class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all text-gray-600"
          [class.border-red-500]="registerForm.get('username')?.touched && registerForm.get('username')?.invalid"
          placeholder="Nombre de usuario">
        <form-error-label [control]="registerForm.get('username')!" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
        <input type="password" formControlName="password"
          class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all text-gray-600"
          [class.border-red-500]="registerForm.get('password')?.touched && registerForm.get('password')?.invalid"
          placeholder="••••••••">
        <form-error-label [control]="registerForm.get('password')!" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Confirmar Contraseña</label>
        <input type="password" formControlName="confirmPassword"
          class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all text-gray-600"
          [class.border-red-500]="registerForm.get('confirmPassword')?.touched && registerForm.hasError('mismatch')"
          placeholder="••••••••">

        @if (registerForm.get('confirmPassword')?.touched && registerForm.hasError('mismatch')) {
        <span class="text-red-500 text-xs mt-1">Las contraseñas no coinciden.</span>
        }
      </div>

      <button type="submit" [disabled]="registerForm.invalid"
        class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white font-semibold py-2 rounded-lg transition-colors shadow-md mt-4">
        Registrarse
      </button>

    </form>

    <div class="mt-6 text-center">
      <p class="text-sm text-gray-600">
        ¿Ya tienes cuenta?
        <a routerLink="/auth/login" class="text-blue-600 font-semibold hover:underline cursor-pointer">
          Inicia sesión aquí
        </a>
      </p>
      <a routerLink="" class="text-blue-700 text-xs">Volver al inicio</a>
    </div>
  </div>
</div>
