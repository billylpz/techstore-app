<div class="min-h-screen flex items-center justify-center bg-slate-600 px-4  rounded-xl">
  <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8">
    <h2 class="text-2xl font-bold text-center text-gray-800 mb-8"> Login</h2>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
        <input type="text" formControlName="username"
          class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all text-gray-400"
          [class.border-red-500]="loginForm.get('username')?.touched && loginForm.get('username')?.invalid"
          placeholder="Tu usuario">
        <form-error-label [control]="loginForm.get('username')!" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
        <input type="password" formControlName="password"
          class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all text-gray-400"
          [class.border-red-500]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
          placeholder="••••••••">
        <form-error-label [control]="loginForm.get('password')!" />
      </div>


      <button type="submit" [disabled]="loginForm.invalid"
        class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white font-semibold py-2 rounded-lg transition-colors shadow-md">
        Ingresar
      </button>

    </form>

    <div class="mt-6 text-center">
      <p class="text-sm text-gray-600">
        ¿No tienes cuenta?
        <a routerLink="/auth/register" class="text-blue-600 font-semibold hover:underline cursor-pointer">
          Registrate aquí
        </a>
      </p>
    </div>
  </div>
</div>
