<div (click)="closeCart()" class="fixed inset-0 bg-black/50 z-60 transition-opacity" [class.hidden]="!isOpen()"
  [class.opacity-100]="isOpen()">
</div>

<div class="fixed top-0 right-0 h-screen w-96 bg-white z-70 shadow-2xl transform transition-transform duration-300 flex flex-col
    text-black" [class.translate-x-full]="!isOpen()" [class.translate-x-0]="isOpen()">

  <div class="p-5 border-b flex justify-between items-center">
    <h2 class="text-2xl font-bold">Carrito de compras</h2>
    <button (click)="closeCart()" class="text-3xl cursor-pointer">&times;</button>
  </div>


  <div class="flex-1 overflow-y-auto p-5 space-y-4">
    <!-- items -->

    @for (item of cartItems(); track item.product.id) {
    <div class="flex gap-4 border-b pb-4">
      <a [routerLink]="['product-details',item.product.id]">
        <img [src]="item.product.images![0].imageUrl" class="w-20 h-20 object-cover rounded">
      </a>
      <div class="flex-1">
        <p class="font-semibold line-clamp-2">{{item.product.name}}</p>
        <p class="text-blue-600 font-bold">S/ {{item.product.price | number:'1.2-2'}}</p>
        <div class="flex items-center mt-2 justify-between">
          <div class="flex gap-2">
            <button class="border px-2 rounded-sm cursor-pointer" (click)="cartService.decrement(item)">-</button>
            <input type="text" class="w-10 focus:outline-none text-center" [value]="item.quantity"
              (input)="updateQuantity(item,inputQuantity)" (focus)="inputQuantity.select()" #inputQuantity>
            <button class="border px-2 rounded-sm cursor-pointer" (click)="cartService.increment(item)">+</button>
          </div>
          <button class="cursor-pointer text-red-400" (click)="cartService.deleteItem(item)">
            <fa-icon [icon]="faTrash" />
          </button>
        </div>
      </div>
    </div>
    }
  </div>

  <div class="p-5 border-t bg-gray-50">
    <div class="flex justify-between mb-4">
      <span class="text-lg">Subtotal:</span>
      <span class="text-xl font-bold text-blue-700">S/ {{cartService.getTotal() | number:'1.2-2'}}</span>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <button class="btn btn-primary bg-blue-600 border-none text-white" [disabled]="cartItems().length==0"
        (click)="onPagar()">Pagar</button>
      <button class="btn btn-outline border-blue-600 text-blue-600">Ver carrito</button>
    </div>
  </div>
</div>
