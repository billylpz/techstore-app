<div class="min-h-[calc(100vh-160px)] bg-gray-50 py-10 px-4 rounded-sm">
  <div class="max-w-2xl mx-auto  flex flex-col items-center">

    <div class="mb-8 ">
      <h1 class="text-3xl font-bold text-gray-800">Mi Perfil</h1>
      <p class="text-gray-500">Cambiar contraseña</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 max-w-1/2">
      <form [formGroup]="myForm" class="space-y-6" (ngSubmit)="onSubmit()">

        <div class="flex flex-col gap-6 ">
          <div class="form-control">
            <label class="label font-semibold text-gray-700">Contraseña actual</label>
            <input type="password" formControlName="currentPassword" class="input w-full border-blue-600  bg-white" />
            <form-error-label [control]="myForm.get('currentPassword')!" />
          </div>

          <div class="flex flex-col gap-5">
            <div class="form-control">
              <label class="label font-semibold text-gray-700">Contraseña nueva</label>
              <input type="password" formControlName="password" class="input  w-full border-blue-600  bg-white" />
              <form-error-label [control]="myForm.get('password')!" />
            </div>

            <div class="form-control">
              <label class="label font-semibold text-gray-700">Repetir contraseña nueva</label>
              <input type="password" formControlName="confirmPassword" class="input  w-full border-blue-600  bg-white" />
              <form-error-label [control]="myForm.get('confirmPassword')!" />
            </div>
          </div>

          @if (myForm.get('confirmPassword')?.touched && myForm.hasError('mismatch')) {
          <span class="text-red-500 text-xs mt-1">Las contraseñas no coinciden.</span>
          }
        </div>



        <div class="flex items-center justify-end gap-4 mt-8">
          <button type="button" class="btn btn-ghost " (click)="onCancel()">
            Cancelar
          </button>
          <button type="submit" class="btn bg-blue-600 hover:bg-blue-700 border-none text-white px-8"
            [disabled]="myForm.invalid">
            Guardar cambios
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
