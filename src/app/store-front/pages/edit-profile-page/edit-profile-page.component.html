<div class="min-h-[calc(100vh-160px)] bg-gray-50 py-10 px-4 rounded-sm">
  <div class="max-w-2xl mx-auto">

    <div class="mb-8">
      <h1 class="text-3xl font-bold text-gray-800">Mi Perfil</h1>
      <p class="text-gray-500">Gestiona tu información personal y cuenta</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
      <form [formGroup]="myForm" class="space-y-6" (ngSubmit)="onSubmit()">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

          <div class="form-control">
            <label class="label font-semibold text-gray-700">Nombre</label>
            <input type="text" formControlName="name" placeholder="Tu nombre"
              class="input w-full border-blue-600  bg-white" />
            <form-error-label [control]="myForm.get('name')!" />
          </div>

          <div class="form-control">
            <label class="label font-semibold text-gray-700">Apellido</label>
            <input type="text" formControlName="lastname" placeholder="Tu apellido"
              class="input  w-full border-blue-600  bg-white" />
            <form-error-label [control]="myForm.get('lastname')!" />
          </div>

        </div>

        <div class="form-control">
          <label class="label font-semibold text-gray-700">Nombre de usuario</label>
          <div class="relative">
            <input type="text" formControlName="username" class="input  w-full  border-blue-600  bg-white" />
            <form-error-label [control]="myForm.get('username')!" />
          </div>
        </div>

        <div class="form-control">
          <label class="label font-semibold text-gray-700">Correo electrónico</label>
          <input type="email" formControlName="email" class="input  w-full border-blue-600  bg-white" />
          <form-error-label [control]="myForm.get('email')!" />

        </div>

        <div class="divider"></div>
        <a class="text-sm text-blue-500" routerLink="../password">Cambiar contraseña</a>

        <div class="flex items-center justify-end gap-4 mt-8">
          <button type="button" class="btn btn-ghost " routerLink="/">
            Cancelar
          </button>
          <button type="submit" class="btn bg-blue-600 hover:bg-blue-700 border-none text-white px-8"
            [disabled]="myForm.invalid">
            Guardar cambios
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
